# Forces Nixpacks to provision Node 20 explicitly via nixPkgs, since the
# package.json lives in site/ (not at the repo root, so auto-detection won't
# fire). Previously used `providers = ["node"]`, but Railway's Nixpacks builder
# stopped honoring that field — explicit nixPkgs is the robust pattern.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["cd site && npm ci"]

[phases.build]
cmds = ["cd site && npm run build"]

[start]
cmd = "cd site && npm start"
